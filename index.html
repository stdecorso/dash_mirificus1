<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Ambientale - ISPRA Mirificus</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script src="https://unpkg.com/proj4@2.9.0/dist/proj4.js"></script>

  <style>
    body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
    .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 8px; }
    #mapDiv { height: 550px; border-radius: 8px; z-index: 1; }
    #myDiv { height: 550px; }
    .legend {
      background: white;
      padding: 12px;
      line-height: 24px;
      color: #333;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      font-size: 13px;
    }
    .legend i {
      width: 20px;
      height: 20px;
      float: left;
      margin-right: 10px;
      opacity: 0.8;
      border: 1px solid #999;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">📊 Variazioni LST a diversi livelli di urbanizzazione</span>
  </div>
</nav>

<div class="container-fluid px-4">
  <div class="card p-3 mb-4">
    <div class="row g-3 align-items-center">
      <div class="col-md-5">
        <label for="liv_artifSelect" class="form-label fw-bold">Seleziona Categoria / Livello Artificiale</label>
        <select id="liv_artifSelect" class="form-select">
          <option value="1" selected>Rurale LC minore del 10%</option>
          <option value="2">Suburbano LC 10%-50%</option>
          <option value="3">Urbano LC maggiore del 50%</option>
        </select>
      </div>
      <div class="col-md-5">
        <label for="comuneSelect" class="form-label fw-bold">Filtra per Comune</label>
        <select id="comuneSelect" class="form-select">
          <option value="all">Tutti i Comuni</option>
        </select>
      </div>
      <div class="col-md-2 d-flex align-items-end h-100">
        <button id="resetBtn" class="btn btn-outline-secondary w-100" style="margin-top: 32px;">Reset</button>
      </div>
    </div>
  </div>

  <div id="error" class="text-danger my-2 fw-bold"></div>

  <div class="row g-4">
    <div class="col-lg-6">
      <div class="card p-3">
        <h5 class="card-title border-bottom pb-2 text-secondary">Percentuale di Copertura Consumata per Comune</h5>
        <div id="myDiv"></div>
      </div>
    </div>
    
    <div class="col-lg-6">
      <div class="card p-3">
        <h5 class="card-title border-bottom pb-2 text-secondary">Localizzazione Geografica Livelli</h5>
        <div id="mapDiv"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Proiezioni CRS
proj4.defs('EPSG:3035', '+proj=laea +lat_0=52 +lon_0=10 +x_0=4321000 +y_0=3210000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');
proj4.defs('EPSG:4326', '+proj=longlat +datum=WGS84 +no_defs');

// URL GeoServer con Proxy allorigins incorporato per evitare i blocchi di caricamento JSON/XML
const originaleUrl = 'https://mirificus.isprambiente.it/geoserver/geonode/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=geonode%3Asuhi_comuni&maxFeatures=60&outputFormat=application%2Fjson';
const geoserverUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(originaleUrl);

// Mappa dei colori per i 3 livelli artificiali
const coloriLivelli = {
  1: '#FFCC00', // Giallo / Oro
  2: '#FF6600', // Arancione
  3: '#CC0000'  // Rosso Scuro
};

let originalGeojsonData = null;
let data = [];
let map;
let geojsonLayer;
let selectedLevel = 1;
let selectedComune = "all";

function getFeatureStyle(feature) {
  const lvl = parseInt(feature.properties.liv_artif) || 1;
  return {
    fillColor: coloriLivelli[lvl] || '#999',
    weight: 1.5,
    color: '#333',
    fillOpacity: 0.75
  };
}

async function loadData() {
  try {
    const response = await fetch(geoserverUrl);
    if (!response.ok) throw new Error('Errore server: ' + response.status);
    const geojsonData = await response.json();

    if (!geojsonData.features || geojsonData.features.length === 0) {
      throw new Error('Nessuna feature trouvata.');
    }

    geojsonData.features.forEach(feature => {
      if (feature.geometry && feature.geometry.type === 'MultiPolygon') {
        feature.geometry.coordinates = feature.geometry.coordinates.map(polygon =>
          polygon.map(ring =>
            ring.map(coord => proj4('EPSG:3035', 'EPSG:4326', [coord[0], coord[1]]))
          )
        );
      }
    });

    originalGeojsonData = JSON.parse(JSON.stringify(geojsonData));

    data = geojsonData.features.map(feature => ({
      liv_artif: parseInt(feature.properties.liv_artif) || 1,
      cop_arb: feature.properties.cop_arb || 0,
      cop_erb: feature.properties.cop_erb || 0,
      cop_cons: feature.properties.cop_cons || 0,
      comune: feature.properties.comune || 'Sconosciuto'
    }));

    const comuniList = [...new Set(data.map(item => item.comune))].sort();
    const comuneSelect = document.getElementById('comuneSelect');
    comuniList.forEach(comune => {
      const option = document.createElement('option');
      option.value = comune;
      option.text = comune;
      comuneSelect.appendChild(option);
    });

    map = L.map('mapDiv').setView([42.5, 12.5], 6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CARTO'
    }).addTo(map);

    geojsonLayer = L.geoJSON(null).addTo(map);

    // CORREZIONE: Nuova Legenda coordinata con le tue definizioni scientifiche
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'info legend');
      div.innerHTML = '<h6>Livelli Urbanizzazione</h6>';
      div.innerHTML += '<i style="background:' + coloriLivelli[1] + '"></i> Rurale (LC &lt; 10%)<br>';
      div.innerHTML += '<i style="background:' + coloriLivelli[2] + '"></i> Suburbano (LC 10%-50%)<br>';
      div.innerHTML += '<i style="background:' + coloriLivelli[3] + '"></i> Urbano (LC &gt; 50%)<br>';
      return div;
    };
    legend.addTo(map);

    updateDashboard();

  } catch (error) {
    document.getElementById('error').innerText = 'Errore caricamento dati: ' + error.message;
    console.error(error);
  }
}

function updateDashboard() {
  let filteredData = data.filter(item => item.liv_artif === parseInt(selectedLevel));
  
  if (selectedComune !== "all") {
    filteredData = filteredData.filter(item => item.comune === selectedComune);
  }

  const comuni = filteredData.map(item => item.comune);
  const trace = {
    x: comuni,
    y: filteredData.map(item => item.cop_cons),
    type: 'bar',
    name: `Livello ${selectedLevel}`,
    marker: { color: coloriLivelli[selectedLevel] }
  };

  const layout = {
    margin: { t: 30, l: 40, r: 20, b: 80 },
    xaxis: { tickangle: -45 },
    yaxis: { title: 'Copertura Consumata (%)', range: [0, 100] }
  };
  Plotly.newPlot('myDiv', [trace], layout);

  geojsonLayer.clearLayers();
  
  const filteredFeatures = originalGeojsonData.features.filter(feature => {
    const matchLvl = parseInt(feature.properties.liv_artif) === parseInt(selectedLevel);
    const matchCom = (selectedComune === "all" || feature.properties.comune === selectedComune);
    return matchLvl && matchCom;
  });

  geojsonLayer.addData({ type: 'FeatureCollection', features: filteredFeatures });
  
  geojsonLayer.eachLayer(layer => {
    layer.setStyle(getFeatureStyle(layer.feature));
    layer.bindPopup(`
      <div class="p-1">
        <h5>${layer.feature.properties.comune}</h5>
        <hr class="my-1">
        <b>Categoria:</b> Livello Artificiale ${layer.feature.properties.liv_artif}<br>
        <span style="color:${coloriLivelli[selectedLevel]}">●</span> <b>Copertura Consumata:</b> ${layer.feature.properties.cop_cons}%<br>
        <small class="text-muted">Arborea: ${layer.feature.properties.cop_arb}% | Erbacea: ${layer.feature.properties.cop_erb}%</small>
      </div>
    `);

    layer.on('click', function() {
      selectedComune = layer.feature.properties.comune;
      document.getElementById('comuneSelect').value = selectedComune;
      updateDashboard();
    });
  });

  if (selectedComune !== "all" && geojsonLayer.getLayers().length > 0) {
    map.fitBounds(geojsonLayer.getBounds(), { maxZoom: 12 });
  }
}

document.getElementById('liv_artifSelect').addEventListener('change', function() {
  selectedLevel = this.value;
  updateDashboard();
});

document.getElementById('comuneSelect').addEventListener('change', function() {
  selectedComune = this.value;
  updateDashboard();
});

document.getElementById('resetBtn').addEventListener('click', function() {
  selectedComune = "all";
  document.getElementById('comuneSelect').value = "all";
  updateDashboard();
  map.setView([42.5, 12.5], 6);
});

loadData();
</script>

</body>
</html>
